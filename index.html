<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Rider - Catálogo Multimedia Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #121824;
            --bg-card: #1c2333;
            --accent-color: #00bcd4;
            --accent-hover: #00acc1;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --star-color: #ffb300;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            background-color: var(--bg-secondary);
            padding: 15px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
        }

        .brand i {
            color: var(--accent-color);
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 500px;
            width: 100%;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            background-color: var(--bg-card);
            border: 1px solid transparent;
            border-radius: 30px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.2);
        }

        .search-container i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
        }

        nav::-webkit-scrollbar {
            height: 4px;
        }
        nav::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 10px;
        }

        .nav-btn {
            background-color: var(--bg-card);
            color: var(--text-muted);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.3s;
            text-transform: capitalize;
        }

        .nav-btn.active, .nav-btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-primary);
            font-weight: 600;
        }

        /* --- FEATURED HERO BANNER --- */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 45vh;
            min-height: 300px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            margin-bottom: 30px;
            transition: background-image 0.5s ease-in-out;
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg-primary) 5%, rgba(10,14,23,0.4) 70%, rgba(10,14,23,0.7));
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 0 5% 40px 5%;
            max-width: 800px;
        }

        .hero-tag {
            background-color: var(--accent-color);
            color: var(--bg-primary);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .hero-desc {
            color: var(--text-muted);
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- MAIN GRID --- */
        main {
            padding: 0 5%;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title span {
            color: var(--accent-color);
            text-transform: capitalize;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        @media (min-width: 576px) {
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
        }

        /* --- CARD STYLING --- */
        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 188, 212, 0.25);
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 145%;
            background-color: var(--bg-secondary);
        }

        .card-img-wrapper img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }

        .card-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(4px);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .card-rating {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 179, 0, 0.9);
            color: #000;
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .card-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* --- MODAL DETAILS --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(6, 9, 15, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            width: 100%;
            max-width: 750px;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.5);
            border: none; color: white;
            width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; z-index: 10;
            transition: background 0.3s;
        }

        .modal-close:hover { background: var(--accent-color); color: var(--bg-primary); }

        .modal-hero {
            position: relative;
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
        }

        .modal-hero::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(to top, var(--bg-secondary), rgba(18,24,36,0.2));
        }

        .modal-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            margin-top: -60px;
        }

        @media (min-width: 576px) {
            .modal-body { flex-direction: row; align-items: flex-start; }
        }

        .modal-poster {
            width: 130px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            object-fit: cover;
            flex-shrink: 0;
            align-self: center;
            background-color: var(--bg-card);
        }

        @media (min-width: 576px) {
            .modal-poster { align-self: flex-start; width: 150px; }
        }

        .modal-details { flex: 1; }

        .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
        .modal-orig-title { font-size: 13px; color: var(--text-muted); font-style: italic; margin-bottom: 10px; }
        
        .modal-meta-row {
            display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
            margin-bottom: 15px; font-size: 13px;
        }

        .badge-year { background: var(--bg-card); padding: 2px 8px; border-radius: 4px; color: #fff;}
        .badge-rating { background: var(--star-color); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 700; }

        .modal-overview {
            font-size: 14px; color: #cbd5e1; line-height: 1.6; margin-bottom: 20px;
            text-align: justify;
        }

        .modal-extra-info {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
        }

        .info-group span { color: var(--text-muted); display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;}
        .info-group p { color: var(--text-main); font-weight: 500; }

        .modal-action-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background-color: var(--accent-color); color: var(--bg-primary);
            padding: 10px 20px; border-radius: 8px; text-decoration: none;
            font-weight: 600; font-size: 14px; margin-top: 15px; transition: background 0.3s;
        }
        .modal-action-btn:hover { background-color: var(--accent-hover); }

        /* --- STATUS LABELS --- */
        .status-msg {
            grid-column: 1 / -1; text-align: center; padding: 40px;
            color: var(--text-muted); font-size: 15px;
        }
        .status-msg i { font-size: 30px; color: var(--accent-color); display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="brand" onclick="cambiarCategoria('todos')">
            <i class="fa-solid fa-cloud-bolt"></i> Cloud Rider
        </a>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="buscador" placeholder="Buscar títulos, géneros o palabras clave..." oninput="filtrarCatalogo()">
        </div>

        <nav id="menu-categorias">
            <button class="nav-btn active" onclick="cambiarCategoria('todos')">Todos</button>
            <button class="nav-btn" onclick="cambiarCategoria('peliculas')">Películas</button>
            <button class="nav-btn" onclick="cambiarCategoria('series')">Series</button>
            <button class="nav-btn" onclick="cambiarCategoria('juegos')">Juegos</button>
            <button class="nav-btn" onclick="cambiarCategoria('doramas')">Doramas</button>
            <button class="nav-btn" onclick="cambiarCategoria('novelas')">Novelas</button>
            <button class="nav-btn" onclick="cambiarCategoria('animados')">Animados</button>
            <button class="nav-btn" onclick="cambiarCategoria('animes')">Animes</button>
        </nav>
    </header>

    <div class="hero-banner" id="hero-banner">
        <div class="hero-content">
            <span class="hero-tag" id="hero-tag">Cloud Rider</span>
            <h1 class="hero-title" id="hero-title">Cargando catálogo...</h1>
            <p class="hero-desc" id="hero-desc">Espera un momento mientras sincronizamos tu base de datos distribuida en Vercel.</p>
        </div>
    </div>

    <main>
        <h2 class="section-title">Explorando: <span id="titulo-seccion">Todo el catálogo</span></h2>
        <div class="grid-container" id="contenedor-tarjetas">
            <div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Cargando base de datos desde archivos CSV...</div>
        </div>
    </main>

    <div class="modal" id="modal-detalle" onclick="cerrarModalExterno(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-hero" id="modal-hero-bg"></div>
            <div class="modal-body">
                <img class="modal-poster" id="modal-poster-img" src="" alt="Poster">
                <div class="modal-details">
                    <h2 class="modal-title" id="modal-txt-titulo"></h2>
                    <p class="modal-orig-title" id="modal-txt-original"></p>
                    
                    <div class="modal-meta-row">
                        <span class="badge-year" id="modal-txt-anio"></span>
                        <span class="badge-rating" id="modal-txt-puntuacion"></span>
                        <span id="modal-txt-generos" style="color: var(--accent-color); font-weight: 500;"></span>
                    </div>

                    <p class="modal-overview" id="modal-txt-sinopsis"></p>

                    <div class="modal-extra-info" id="modal-contenedor-extras"></div>
                    <div id="modal-contenedor-link"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Al estar en Vercel, usamos rutas relativas directas al mismo directorio base
        const CSV_FUENTES = {
            peliculas: 'peliculas_data_avanzado.csv',
            series: 'series_data.csv',
            juegos: 'juegos_data.csv',
            doramas: 'doramas_data.csv',
            novelas: 'novelas_data.csv',
            animados: 'animados_data.csv',
            animes: 'animes_data.csv'
        };

        let DB = []; 
        let categoriaActual = 'todos';
        let intervaloHero = null;

        // Parser tolerante y robusto adaptado a delimitador ';' e irregularidades de saltos de línea de Excel
        function procesarTextoCSV(texto, categoriaAsignada) {
            const lineas = texto.split(/\r?\n/);
            if (lineas.length < 2) return [];

            const encabezados = lineas[0].split(';').map(h => h.trim());
            const registros = [];

            for (let i = 1; i < lineas.length; i++) {
                let linea = lineas[i].trim();
                if (!linea) continue; 

                let columnas = [];
                let dentroDeComillas = false;
                let columnaActual = "";

                for (let c = 0; c < linea.length; c++) {
                    let char = linea[c];
                    if (char === '"') {
                        dentroDeComillas = !dentroDeComillas;
                    } else if (char === ';' && !dentroDeComillas) {
                        columnas.push(columnaActual.trim());
                        columnaActual = "";
                    } else {
                        columnaActual += char;
                    }
                }
                columnas.push(columnaActual.trim());

                let itemRaw = {};
                encabezados.forEach((encabezado, index) => {
                    let valor = columnas[index] || "";
                    if (valor.startsWith('"') && valor.endsWith('"')) {
                        valor = valor.slice(1, -1);
                    }
                    itemRaw[encabezado] = valor;
                });

                // Mapeo unificado estricto de campos
                let itemNormalizado = {
                    id: `${categoriaAsignada}_${i}`,
                    category: categoriaAsignada,
                    titulo: itemRaw.Titulo_encontrado || itemRaw.Titulo || itemRaw.Titulo_original || itemRaw.Original || "Sin título",
                    tituloOriginal: itemRaw.Titulo_original || itemRaw.Original || "",
                    anio: itemRaw.Anio || "N/A",
                    sinopsis: itemRaw.Sinopsis || "No hay sinopsis descriptiva disponible.",
                    generos: itemRaw.Generos || "General",
                    imagen: itemRaw.Poster_URL || itemRaw.Link_Imagen || "https://via.placeholder.com/300x450?text=No+Poster",
                    backdrop: itemRaw.Backdrop_URL || itemRaw.Poster_URL || itemRaw.Link_Imagen || "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1425",
                    puntuacion: itemRaw.Puntuacion_TMDB || itemRaw.Puntuacion_IMDb || itemRaw.Puntuacion_Usuario || itemRaw.Puntuacion || "N/A",
                    
                    temporadas: itemRaw.Temporadas || "",
                    episodios: itemRaw.Episodios || itemRaw.Capitulos || "",
                    desarrollador: itemRaw.Desarrolladores || "",
                    editor: itemRaw.Editores || "",
                    duracion: itemRaw.Duracion_min || "",
                    url: itemRaw.URL_Externa || itemRaw.URL_TMDB || itemRaw.URL_Slug || ""
                };

                registros.push(itemNormalizado);
            }
            return registros;
        }

        // Carga asíncrona segura desde el dominio de Vercel
        async function cargarBaseDeDatosDesdeCSV() {
            DB = []; 
            const contenedor = document.getElementById('contenedor-tarjetas');
            
            for (const [categoria, nombreArchivo] of Object.entries(CSV_FUENTES)) {
                try {
                    // Cache-busting para obligar a Vercel a servir los datos frescos si modificas el CSV
                    const response = await fetch(`${nombreArchivo}?v=${Date.now()}`);
                    if (!response.ok) {
                        console.warn(`Archivo omitido o no encontrado en el servidor: ${nombreArchivo}`);
                        continue;
                    }
                    
                    const texto = await response.text();
                    const itemsProcesados = procesarTextoCSV(texto, categoria);
                    DB = DB.concat(itemsProcesados);
                } catch (err) {
                    console.error(`Error cargando recurso en red [${nombreArchivo}]:`, err);
                }
            }

            if (DB.length === 0) {
                contenedor.innerHTML = `<div class="status-msg"><i class="fa-solid fa-triangle-exclamation"></i> No se pudieron recuperar datos. Verifica que los archivos CSV estén en la raíz de tu Vercel.</div>`;
                return;
            }

            // Mezclado dinámico inicial
            DB.sort(() => Math.random() - 0.5);

            renderizarTarjetas(DB);
            iniciarHeroRotativo();
        }

        function renderizarTarjetas(listaElementos) {
            const contenedor = document.getElementById('contenedor-tarjetas');
            contenedor.innerHTML = "";

            if (listaElementos.length === 0) {
                contenedor.innerHTML = `<div class="status-msg"><i class="fa-solid fa-magnifying-glass"></i> No hay resultados para esta búsqueda.</div>`;
                return;
            }

            listaElementos.forEach(item => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'card';
                tarjeta.onclick = () => abrirModal(item);

                let txtPuntuacion = item.puntuacion !== "N/A" ? parseFloat(item.puntuacion).toFixed(1) : "N/A";
                let anioLimpio = item.anio.split('-')[0].trim();

                tarjeta.innerHTML = `
                    <div class="card-img-wrapper">
                        <span class="card-badge">${item.category}</span>
                        ${txtPuntuacion !== "N/A" && txtPuntuacion !== "0.0" ? `<span class="card-rating"><i class="fa-solid fa-star"></i> ${txtPuntuacion}</span>` : ''}
                        <img src="${item.imagen}" alt="${item.titulo}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=Sin+Imagen'">
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">${item.titulo}</h3>
                        <div class="card-meta">
                            <span><i class="fa-regular fa-calendar"></i> ${anioLimpio !== "" ? anioLimpio : 'N/A'}</span>
                        </div>
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });
        }

        function filtrarCatalogo() {
            const busqueda = document.getElementById('buscador').value.toLowerCase().trim();

            const datosFiltrados = DB.filter(item => {
                const coincideCategoria = (categoriaActual === 'todos' || item.category === categoriaActual);
                const coincideTexto = !busqueda || 
                    item.titulo.toLowerCase().includes(busqueda) || 
                    item.tituloOriginal.toLowerCase().includes(busqueda) || 
                    item.generos.toLowerCase().includes(busqueda) || 
                    item.sinopsis.toLowerCase().includes(busqueda);

                return coincideCategoria && coincideTexto;
            });

            renderizarTarjetas(datosFiltrados);
        }

        function cambiarCategoria(nuevaCategoria) {
            categoriaActual = nuevaCategoria;
            
            const botones = document.querySelectorAll('.nav-btn');
            botones.forEach(btn => {
                if (btn.innerText.toLowerCase() === nuevaCategoria || (nuevaCategoria === 'todos' && btn.innerText.toLowerCase() === 'todos')) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            document.getElementById('titulo-seccion').innerText = nuevaCategoria === 'todos' ? 'Todo el catálogo' : nuevaCategoria;
            filtrarCatalogo();
        }

        function abrirModal(item) {
            document.getElementById('modal-hero-bg').style.backgroundImage = `url('${item.backdrop}')`;
            document.getElementById('modal-poster-img').src = item.imagen;
            document.getElementById('modal-poster-img').onerror = function() { this.src = 'https://via.placeholder.com/300x450?text=No+Image'; };
            document.getElementById('modal-txt-titulo').innerText = item.titulo;
            
            const txtOrig = document.getElementById('modal-txt-original');
            if (item.tituloOriginal && item.tituloOriginal !== item.titulo) {
                txtOrig.innerText = `Título Original: ${item.tituloOriginal}`;
                txtOrig.style.display = 'block';
            } else {
                txtOrig.style.display = 'none';
            }

            document.getElementById('modal-txt-anio').innerHTML = `<i class="fa-regular fa-calendar"></i> ${item.anio}`;
            
            let numPunt = item.puntuacion !== "N/A" ? parseFloat(item.puntuacion).toFixed(1) : "N/A";
            document.getElementById('modal-txt-puntuacion').innerHTML = `<i class="fa-solid fa-star"></i> ${numPunt}`;
            document.getElementById('modal-txt-generos').innerText = item.generos;
            document.getElementById('modal-txt-sinopsis').innerText = item.sinopsis;

            const contenedorExtras = document.getElementById('modal-contenedor-extras');
            contenedorExtras.innerHTML = "";

            if (item.temporadas) {
                contenedorExtras.innerHTML += `<div class="info-group"><span>Temporadas</span><p>${item.temporadas}</p></div>`;
            }
            if (item.episodios) {
                contenedorExtras.innerHTML += `<div class="info-group"><span>Episodios / Capítulos</span><p>${item.episodios}</p></div>`;
            }
            if (item.duracion) {
                contenedorExtras.innerHTML += `<div class="info-group"><span>Duración</span><p>${item.duracion} min</p></div>`;
            }
            if (item.desarrollador || item.editor) {
                let devInfo = [item.desarrollador, item.editor].filter(Boolean).join(' / ');
                contenedorExtras.innerHTML += `<div class="info-group"><span>Desarrollador / Editor</span><p>${devInfo}</p></div>`;
            }

            const contenedorLink = document.getElementById('modal-contenedor-link');
            if (item.url && item.url !== "#" && item.url.trim() !== "") {
                contenedorLink.innerHTML = `
                    <a href="${item.url}" target="_blank" class="modal-action-btn">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> Ver enlace o plataforma
                    </a>
                `;
            } else {
                contenedorLink.innerHTML = "";
            }

            document.getElementById('modal-detalle').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function cerrarModal() {
            document.getElementById('modal-detalle').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function cerrarModalExterno(event) {
            if (event.target.id === 'modal-detalle') {
                cerrarModal();
            }
        }

        function iniciarHeroRotativo() {
            if (intervaloHero) clearInterval(intervaloHero);
            
            function actualizarHero() {
                if (DB.length === 0) return;
                const candidatos = DB.filter(i => i.sinopsis.length > 40);
                const itemAleatorio = candidatos[Math.floor(Math.random() * candidatos.length)] || DB[0];

                document.getElementById('hero-banner').style.backgroundImage = `url('${itemAleatorio.backdrop}')`;
                document.getElementById('hero-tag').innerText = itemAleatorio.category;
                document.getElementById('hero-title').innerText = itemAleatorio.titulo;
                document.getElementById('hero-desc').innerText = itemAleatorio.sinopsis;
            }

            actualizarHero();
            intervaloHero = setInterval(actualizarHero, 12000); // Rota el banner cada 12 segundos
        }

        document.addEventListener('DOMContentLoaded', cargarBaseDeDatosDesdeCSV);
    </script>
</body>
</html>
